<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPFS HLS Player</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
      }
      h1 {
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }
      #status {
        margin-bottom: 1rem;
        padding: 0.5rem 1rem;
        background: #16213e;
        border-radius: 4px;
        font-size: 0.9rem;
        min-height: 2rem;
      }
      #video-container {
        width: 100%;
        max-width: 800px;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
      }
      video {
        width: 100%;
        display: block;
      }
      .error {
        color: #ff6b6b;
      }
      .ready {
        color: #51cf66;
      }
      .loading {
        color: #ffd43b;
      }
    </style>
  </head>
  <body>
    <h1>IPFS HLS Video Player</h1>
    <div id="status" class="loading">Initializing...</div>
    <div id="video-container">
      <video id="video" controls></video>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
